<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego Historia Industrial Argentina</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0f0f13;
  --surface: #1a1a22;
  --border: #2e2e3d;
  --accent: #7c6af7;
  --accent2: #f7a06a;
  --green: #3ecf8e;
  --red: #f76a6a;
  --text: #e8e8f0;
  --muted: #888899;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px 40px;
  background-image: radial-gradient(ellipse at 20% 10%, rgba(124,106,247,0.12) 0%, transparent 50%),
                    radial-gradient(ellipse at 80% 80%, rgba(247,160,106,0.08) 0%, transparent 50%);
}

h1 {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: clamp(1.4rem, 4vw, 2rem);
  letter-spacing: -0.03em;
  background: linear-gradient(135deg, #fff 40%, var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 6px;
  text-align: center;
}

.subtitle {
  font-size: 0.85rem;
  color: var(--muted);
  margin-bottom: 20px;
  text-align: center;
}

#puntos-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 8px 22px;
  margin-bottom: 24px;
}

#puntos-wrap span {
  font-family: 'Syne', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.7); }
}

.container {
  display: flex;
  justify-content: center;
  gap: 20px;
  width: 100%;
  max-width: 860px;
  flex-wrap: wrap;
}

.column {
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex: 1;
  min-width: 240px;
  max-width: 400px;
}

.col-label {
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 4px;
  padding-left: 4px;
}

.item {
  padding: 14px 16px;
  border-radius: 12px;
  background: var(--surface);
  cursor: pointer;
  border: 1px solid var(--border);
  font-size: 0.88rem;
  line-height: 1.4;
  transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
  position: relative;
  overflow: hidden;
}

/* Año/intervalo: estilo especial con acento de color */
.item.anio {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  letter-spacing: -0.02em;
  text-align: center;
}

.item.anio .titulo-periodo {
  font-size: 0.72rem;
  font-weight: 400;
  font-family: 'DM Sans', sans-serif;
  color: var(--muted);
  margin-top: 3px;
  letter-spacing: 0;
  line-height: 1.3;
}

.item:hover:not(.correct):not(.wrong) {
  transform: translateY(-2px);
  border-color: var(--accent);
  box-shadow: 0 4px 20px rgba(124,106,247,0.2);
}

.item.selected {
  border-color: var(--accent);
  background: rgba(124,106,247,0.15);
  box-shadow: 0 0 0 3px rgba(124,106,247,0.2);
}

.item.correct {
  background: rgba(62,207,142,0.15);
  border-color: var(--green);
  color: var(--green);
  pointer-events: none;
}

.item.correct .titulo-periodo {
  color: rgba(62,207,142,0.7);
}

.item.wrong {
  background: rgba(247,106,106,0.15);
  border-color: var(--red);
  color: var(--red);
  pointer-events: none;
}

.fade-out {
  opacity: 0;
  transform: scale(0.9) translateY(-8px);
  transition: all 0.45s ease;
}

@keyframes aparecer {
  from { opacity: 0; transform: translateY(10px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.fade-in {
  animation: aparecer 0.35s ease forwards;
}

#mensaje {
  margin-top: 18px;
  font-size: 0.82rem;
  color: var(--red);
  height: 18px;
  transition: opacity 0.3s;
}

#delta {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Syne', sans-serif;
  font-size: 2rem;
  font-weight: 800;
  pointer-events: none;
  opacity: 0;
  transition: none;
}

#delta.show-green {
  color: var(--green);
  animation: floatUp 0.9s ease forwards;
}

#delta.show-red {
  color: var(--red);
  animation: floatUp 0.9s ease forwards;
}

@keyframes floatUp {
  0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  100% { opacity: 0; transform: translate(-50%, -130%) scale(1.3); }
}

@media (max-width: 560px) {
  .container { flex-direction: column; align-items: center; }
  .column { max-width: 100%; min-width: unset; width: 100%; }
}
</style>
</head>

<body>

<h1>Historia Industrial Argentina</h1>
<p class="subtitle">Emparejá el período con su descripción</p>

<div id="puntos-wrap">
  <div class="dot"></div>
  <span id="puntos">Puntos: 0</span>
</div>

<div class="container">
  <div class="column">
    <div class="col-label">Período</div>
    <div id="anios"></div>
  </div>
  <div class="column">
    <div class="col-label">Característica del período</div>
    <div id="descripciones"></div>
  </div>
</div>

<div id="mensaje"></div>
<div id="delta"></div>

<script>
const todosLosPares = [
  {
    anio: "1880",
    titulo: "Modelo Agroexportador",
    descripcion: "Argentina se integra al mercado mundial exportando carne y cereales, con gran influencia del capital británico."
  },
  {
    anio: "1914–1930",
    titulo: "Crisis del Modelo Agroexportador",
    descripcion: "Impacto de la Primera Guerra Mundial; aparecen industrias textiles, alimenticias y metalúrgicas locales."
  },
  {
    anio: "1930",
    titulo: "Inicio de la ISI",
    descripcion: "Golpe de Estado y crisis mundial; Argentina comienza a producir lo que antes importaba con mayor intervención del Estado."
  },
  {
    anio: "1946–1955",
    titulo: "Industrialización y Estado fuerte",
    descripcion: "Gobierno de Perón: fomento de siderurgia, automotriz y energía; creación de empresas estatales y derechos laborales."
  },
  {
    anio: "1955–1976",
    titulo: "Capital extranjero",
    descripcion: "Llegada de empresas multinacionales, especialmente automotrices; desarrollo de polos industriales en Córdoba y Buenos Aires."
  },
  {
    anio: "1976–1983",
    titulo: "Dictadura y apertura",
    descripcion: "Golpe militar, apertura a importaciones, reducción del rol del Estado y desindustrialización acelerada."
  },
  {
    anio: "1990–2001",
    titulo: "Reformas neoliberales",
    descripcion: "Gobierno de Menem: privatización de empresas públicas, convertibilidad peso-dólar y cierre de industrias nacionales."
  },
  {
    anio: "2001",
    titulo: "Crisis económica",
    descripcion: "Grave crisis política y económica: colapso del sistema financiero, caída del empleo y fin de la convertibilidad."
  },
  {
    anio: "2003–2015",
    titulo: "Recuperación industrial",
    descripcion: "Políticas de impulso a la industria nacional; crecimiento del empleo industrial y del consumo interno."
  },
  {
    anio: "2016–Hoy",
    titulo: "Actualidad",
    descripcion: "Argentina diversifica su producción: agroindustria, energía, economía del conocimiento y litio."
  }
];

let aniosActivos = [];
let descripcionesActivas = [];
let seleccion1 = null;
let seleccion2 = null;
let puntos = 0;
let tiempoInicio = Date.now();

const contAnios = document.getElementById("anios");
const contDesc = document.getElementById("descripciones");
const mensaje = document.getElementById("mensaje");
const puntosUI = document.getElementById("puntos");
const delta = document.getElementById("delta");

let vocesDisponibles = [];
speechSynthesis.onvoiceschanged = () => { vocesDisponibles = speechSynthesis.getVoices(); };

function hablar(texto) {
  speechSynthesis.cancel();
  const msg = new SpeechSynthesisUtterance(texto);
  let voz = vocesDisponibles.find(v => v.lang.includes("es") && v.name.toLowerCase().includes("google"))
    || vocesDisponibles.find(v => v.lang.includes("es"));
  if (voz) msg.voice = voz;
  speechSynthesis.speak(msg);
}

function actualizarPuntos() { puntosUI.textContent = "Puntos: " + puntos; }

function mezclar(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function mostrarDelta(texto, esPositivo) {
  delta.textContent = texto;
  delta.className = esPositivo ? "show-green" : "show-red";
  void delta.offsetWidth;
  delta.className = esPositivo ? "show-green" : "show-red";
}

function iniciarJuego() {
  const seleccion = mezclar(todosLosPares).slice(0, 5);
  aniosActivos = [...seleccion];

  const correctos = seleccion.slice(0, 2);
  descripcionesActivas = [...correctos];

  while (descripcionesActivas.length < 5) {
    const random = todosLosPares[Math.floor(Math.random() * todosLosPares.length)];
    if (!descripcionesActivas.some(d => d.descripcion === random.descripcion)) {
      descripcionesActivas.push(random);
    }
  }

  render();
}

function render() {
  contAnios.innerHTML = "";
  contDesc.innerHTML = "";

  aniosActivos.forEach(p => {
    const el = crearItemAnio(p);
    el.classList.add("fade-in");
    contAnios.appendChild(el);
  });

  mezclar(descripcionesActivas).forEach(p => {
    const el = crearItemDesc(p);
    el.classList.add("fade-in");
    contDesc.appendChild(el);
  });
}

function crearItemAnio(par) {
  const div = document.createElement("div");
  div.classList.add("item", "anio");
  div.dataset.tipo = "anio";
  div.dataset.valor = par.anio;

  const anioSpan = document.createElement("div");
  anioSpan.textContent = par.anio;

  const tituloSpan = document.createElement("div");
  tituloSpan.classList.add("titulo-periodo");
  tituloSpan.textContent = par.titulo;

  div.appendChild(anioSpan);
  div.appendChild(tituloSpan);
  div.addEventListener("click", () => manejarSeleccion(div));
  return div;
}

function crearItemDesc(par) {
  const div = document.createElement("div");
  div.classList.add("item");
  div.dataset.tipo = "descripcion";
  div.dataset.valor = par.descripcion;
  div.textContent = par.descripcion;
  div.addEventListener("click", () => manejarSeleccion(div));
  return div;
}

function manejarSeleccion(item) {
  mensaje.textContent = "";

  if (!seleccion1) {
    seleccion1 = item;
    item.classList.add("selected");
    hablar(item.dataset.tipo === "anio" ? item.dataset.valor : item.textContent);
    return;
  }

  if (!seleccion2 && item !== seleccion1) {
    seleccion2 = item;
    item.classList.add("selected");
    hablar(item.dataset.tipo === "anio" ? item.dataset.valor : item.textContent);
    verificar();
  }
}

function verificar() {
  if (seleccion1.dataset.tipo === seleccion2.dataset.tipo) {
    mensaje.textContent = "Elegí un período con una descripción";
    resetSeleccion();
    return;
  }

  const anio = seleccion1.dataset.tipo === "anio" ? seleccion1.dataset.valor : seleccion2.dataset.valor;
  const descripcion = seleccion1.dataset.tipo === "descripcion" ? seleccion1.dataset.valor : seleccion2.dataset.valor;
  const correcto = todosLosPares.find(p => p.anio === anio && p.descripcion === descripcion);

  if (correcto) {
    const tiempo = (Date.now() - tiempoInicio) / 1000;
    const bonus = Math.max(0, 200 - tiempo * 10);
    const ganado = Math.floor(100 + bonus);
    puntos += ganado;
    actualizarPuntos();
    mostrarDelta("+" + ganado, true);

    seleccion1.classList.remove("selected");
    seleccion2.classList.remove("selected");
    seleccion1.classList.add("correct");
    seleccion2.classList.add("correct");

    setTimeout(() => {
      seleccion1.classList.add("fade-out");
      seleccion2.classList.add("fade-out");
    }, 900);

    setTimeout(() => {
      reemplazarPar(anio, descripcion);
      tiempoInicio = Date.now();
    }, 1800);

  } else {
    puntos -= 50;
    actualizarPuntos();
    mostrarDelta("-50", false);

    seleccion1.classList.remove("selected");
    seleccion2.classList.remove("selected");
    seleccion1.classList.add("wrong");
    seleccion2.classList.add("wrong");

    setTimeout(resetSeleccion, 700);
  }
}

function reemplazarPar(anioTexto, descripcionTexto) {
  const itemsAnios = Array.from(contAnios.children);
  const itemsDesc = Array.from(contDesc.children);

  const indexAnio = itemsAnios.findIndex(i => i.dataset.valor === anioTexto);
  const indexDesc = itemsDesc.findIndex(i => i.dataset.valor === descripcionTexto);

  aniosActivos = aniosActivos.filter(p => p.anio !== anioTexto);
  descripcionesActivas = descripcionesActivas.filter(p => p.descripcion !== descripcionTexto);

  const disponibles = todosLosPares.filter(p =>
    !aniosActivos.some(n => n.anio === p.anio)
  );
  const nuevoAnio = disponibles[Math.floor(Math.random() * disponibles.length)];
  aniosActivos.push(nuevoAnio);

  const aniosConPar = aniosActivos.filter(n =>
    descripcionesActivas.some(d => {
      const par = todosLosPares.find(p => p.anio === n.anio);
      return par && par.descripcion === d.descripcion;
    })
  );
  const aniosSinPar = aniosActivos.filter(n =>
    !aniosConPar.some(c => c.anio === n.anio)
  );
  const aniosViejos = aniosSinPar.filter(n => n.anio !== nuevoAnio.anio);

  let elegidoAnio;
  if (Math.random() < 0.8 && aniosViejos.length > 0) {
    elegidoAnio = aniosViejos[Math.floor(Math.random() * aniosViejos.length)];
  } else {
    elegidoAnio = nuevoAnio;
  }

  let nuevaDesc = todosLosPares.find(p => p.anio === elegidoAnio.anio);

  if (descripcionesActivas.some(d => d.descripcion === nuevaDesc.descripcion)) {
    const alternativa = todosLosPares.find(p =>
      !descripcionesActivas.some(d => d.descripcion === p.descripcion)
    );
    if (alternativa) nuevaDesc = alternativa;
  }

  descripcionesActivas.push(nuevaDesc);

  const nuevoAnioDiv = crearItemAnio(nuevoAnio);
  const nuevaDescDiv = crearItemDesc(nuevaDesc);

  nuevoAnioDiv.classList.add("fade-in");
  nuevaDescDiv.classList.add("fade-in");

  contAnios.replaceChild(nuevoAnioDiv, itemsAnios[indexAnio]);
  contDesc.replaceChild(nuevaDescDiv, itemsDesc[indexDesc]);

  resetSeleccion();
}

function resetSeleccion() {
  document.querySelectorAll(".item").forEach(i => {
    i.classList.remove("selected", "wrong", "correct", "fade-out");
  });
  seleccion1 = null;
  seleccion2 = null;
}

iniciarJuego();
</script>

</body>
</html>
