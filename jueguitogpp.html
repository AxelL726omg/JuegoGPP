<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego Emparejar PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0f0f13;
  --surface: #1a1a22;
  --border: #2e2e3d;
  --accent: #7c6af7;
  --accent2: #f7a06a;
  --green: #3ecf8e;
  --red: #f76a6a;
  --text: #e8e8f0;
  --muted: #888899;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px 40px;
  background-image: radial-gradient(ellipse at 20% 10%, rgba(124,106,247,0.12) 0%, transparent 50%),
                    radial-gradient(ellipse at 80% 80%, rgba(247,160,106,0.08) 0%, transparent 50%);
}

h1 {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: clamp(1.4rem, 4vw, 2rem);
  letter-spacing: -0.03em;
  background: linear-gradient(135deg, #fff 40%, var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 6px;
  text-align: center;
}

.subtitle {
  font-size: 0.85rem;
  color: var(--muted);
  margin-bottom: 20px;
  text-align: center;
}

#puntos-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 8px 22px;
  margin-bottom: 24px;
}

#puntos-wrap span {
  font-family: 'Syne', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.7); }
}

.container {
  display: flex;
  justify-content: center;
  gap: 20px;
  width: 100%;
  max-width: 820px;
  flex-wrap: wrap;
}

.column {
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex: 1;
  min-width: 240px;
  max-width: 380px;
}

.col-label {
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 4px;
  padding-left: 4px;
}

.item {
  padding: 14px 16px;
  border-radius: 12px;
  background: var(--surface);
  cursor: pointer;
  border: 1px solid var(--border);
  font-size: 0.88rem;
  line-height: 1.4;
  transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
  position: relative;
  overflow: hidden;
}

.item::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--accent), transparent);
  opacity: 0;
  transition: opacity 0.18s;
}

.item:hover:not(.correct):not(.wrong) {
  transform: translateY(-2px);
  border-color: var(--accent);
  box-shadow: 0 4px 20px rgba(124,106,247,0.2);
}

.item.selected {
  border-color: var(--accent);
  background: rgba(124,106,247,0.15);
  box-shadow: 0 0 0 3px rgba(124,106,247,0.2);
}

.item.correct {
  background: rgba(62,207,142,0.15);
  border-color: var(--green);
  color: var(--green);
  pointer-events: none;
}

.item.wrong {
  background: rgba(247,106,106,0.15);
  border-color: var(--red);
  color: var(--red);
  pointer-events: none;
}

.fade-out {
  opacity: 0;
  transform: scale(0.9) translateY(-8px);
  transition: all 0.45s ease;
}

@keyframes aparecer {
  from { opacity: 0; transform: translateY(10px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.fade-in {
  animation: aparecer 0.35s ease forwards;
}

#mensaje {
  margin-top: 18px;
  font-size: 0.82rem;
  color: var(--red);
  height: 18px;
  transition: opacity 0.3s;
}

#delta {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Syne', sans-serif;
  font-size: 2rem;
  font-weight: 800;
  pointer-events: none;
  opacity: 0;
  transition: none;
}

#delta.show-green {
  color: var(--green);
  animation: floatUp 0.9s ease forwards;
}

#delta.show-red {
  color: var(--red);
  animation: floatUp 0.9s ease forwards;
}

@keyframes floatUp {
  0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  100% { opacity: 0; transform: translate(-50%, -130%) scale(1.3); }
}

@media (max-width: 560px) {
  .container { flex-direction: column; align-items: center; }
  .column { max-width: 100%; min-width: unset; width: 100%; }
}
</style>
</head>

<body>

<h1>Emparejar nombres y descripciones</h1>
<p class="subtitle">Administración de Operaciones</p>

<div id="puntos-wrap">
  <div class="dot"></div>
  <span id="puntos">Puntos: 0</span>
</div>

<div class="container">
  <div class="column">
    <div class="col-label">Autor / Personaje</div>
    <div id="nombres"></div>
  </div>
  <div class="column">
    <div class="col-label">Aporte / Concepto</div>
    <div id="descripciones"></div>
  </div>
</div>

<div id="mensaje"></div>
<div id="delta"></div>

<script>
function reemplazarPar(nombreTexto, descripcionTexto) {
  const itemsNombres = Array.from(contNombres.children);
  const itemsDesc = Array.from(contDesc.children);

  const indexNombre = itemsNombres.findIndex(i => i.textContent === nombreTexto);
  const indexDesc = itemsDesc.findIndex(i => i.textContent === descripcionTexto);

  // Quitamos el par acertado
  nombresActivos = nombresActivos.filter(p => p.nombre !== nombreTexto);
  descripcionesActivas = descripcionesActivas.filter(p => p.descripcion !== descripcionTexto);

  // Nuevo nombre que entra
  const disponibles = todosLosPares.filter(p =>
    !nombresActivos.some(n => n.nombre === p.nombre)
  );
  const nuevoNombre = disponibles[Math.floor(Math.random() * disponibles.length)];
  nombresActivos.push(nuevoNombre);

  // ───── NUEVA LÓGICA INTELIGENTE ─────

  // Detectar cuáles ya tienen su par correcto
  const nombresConPar = nombresActivos.filter(n => {
    const par = todosLosPares.find(p => p.nombre === n.nombre);
    return descripcionesActivas.some(d => d.descripcion === par.descripcion);
  });

  // Nombres sin par (los importantes)
  const nombresSinPar = nombresActivos.filter(n =>
    !nombresConPar.some(c => c.nombre === n.nombre)
  );

  // Sacamos el nuevo para priorizar los viejos
  const candidatos = nombresSinPar.filter(n => n.nombre !== nuevoNombre.nombre);

  let elegidoNombre;

  // 85% prioriza nombres ya visibles SIN par
  if (candidatos.length > 0 && Math.random() < 0.85) {
    elegidoNombre = candidatos[Math.floor(Math.random() * candidatos.length)];
  } else {
    elegidoNombre = nuevoNombre;
  }

  // Obtener su descripción correcta
  let nuevaDesc = todosLosPares.find(p => p.nombre === elegidoNombre.nombre);

  // Evitar duplicados SIEMPRE
  if (descripcionesActivas.some(d => d.descripcion === nuevaDesc.descripcion)) {
    const alternativas = todosLosPares.filter(p =>
      !descripcionesActivas.some(d => d.descripcion === p.descripcion)
    );

    if (alternativas.length > 0) {
      nuevaDesc = alternativas[Math.floor(Math.random() * alternativas.length)];
    }
  }

  descripcionesActivas.push(nuevaDesc);

  // ───── DOM ─────
  const nuevoNombreDiv = crearItem(nuevoNombre.nombre, "nombre");
  const nuevaDescDiv = crearItem(nuevaDesc.descripcion, "descripcion");

  nuevoNombreDiv.classList.add("fade-in");
  nuevaDescDiv.classList.add("fade-in");

  contNombres.replaceChild(nuevoNombreDiv, itemsNombres[indexNombre]);
  contDesc.replaceChild(nuevaDescDiv, itemsDesc[indexDesc]);

  resetSeleccion();
}
</script>

</body>
</html>
